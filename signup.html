<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-orange-400 to-red-500 h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-xl w-96">

<h2 class="text-2xl font-bold mb-4 text-center">Create Account</h2>

<input id="name" placeholder="Name" class="border p-2 w-full mb-3 rounded">

<input id="email" placeholder="Email" class="border p-2 w-full mb-3 rounded">

<input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-4 rounded">

<button onclick="signup()" class="bg-green-500 text-white w-full p-2 rounded">
Signup
</button>

<p class="mt-4 text-center">
Already have account?
<a href="login.html" class="text-blue-500">Login</a>
</p>

</div>

<script>

const API="https://cloud-kitchen-is6g.onrender.com";

async function signup(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const res=await fetch(API+"/api/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name,email,password})
});

const data=await res.json();

alert(data.message);

}

</script>

</body>
</html>
