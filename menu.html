<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Kitchen Admin</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: linear-gradient(135deg,#ff7a18,#ffb347,#ff416c);
min-height:100vh;
font-family:sans-serif;
color:white;
}

/* FORM CARD */
.form-card{
background: rgba(255,255,255,0.18);
backdrop-filter: blur(15px);
border-radius:22px;
padding:30px;
max-width:520px;
margin:auto;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

/* INPUT STYLE */
.input-field{
width:100%;
padding:14px;
border-radius:12px;
color:black;
background:white;
outline:none;
margin-top:6px;
}

/* BUTTON */
.save-btn{
background: linear-gradient(135deg,#00c853,#009624);
padding:14px;
border-radius:14px;
width:100%;
font-weight:bold;
margin-top:12px;
transition:0.25s;
}

.save-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* DISH CARD */
.dish-card{
background: rgba(255,255,255,0.2);
backdrop-filter: blur(10px);
padding:18px;
border-radius:18px;
transition:0.25s;
}

.dish-card:hover{
transform:scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

</style>
</head>

<body class="p-8">

<h1 class="text-4xl font-bold mb-6 text-center">🍛 Kitchen Admin Panel</h1>

<div class="flex justify-center mb-6">
<button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">
Logout
</button>
</div>

<!-- ADD DISH FORM -->

<div class="form-card mb-12">

<h2 class="text-2xl font-bold mb-6 text-center">Add Dish</h2>

<label>Dish Name</label>
<input id="name" class="input-field" placeholder="Paneer Butter Masala">

<label>Category</label>
<select id="category" class="input-field">

<option>Rice</option>
<option>Curry</option>
<option>Breads</option>
<option>Chinese</option>
<option>Beverage</option>
<option>Dessert</option>

</select>

<label>Price ₹</label>
<input id="price" type="number" class="input-field">

<button onclick="saveDish()" class="save-btn">Save Dish</button>

<input type="hidden" id="dishId">

</div>

<!-- DISH LIST -->

<div id="menu-list" class="grid md:grid-cols-3 gap-6"></div>

<script>

/* ===== LOGIN PROTECTION ===== */

const token = localStorage.getItem("token");

if(!token){
alert("Please login first");
window.location="login.html";
}

/* ===== API ===== */

const API="https://cloud-kitchen-is6g.onrender.com/api/dishes";

/* ===== LOGOUT ===== */

function logout(){
localStorage.removeItem("token");
window.location="login.html";
}

/* ===== LOAD DISHES ===== */

async function loadMenu(){

try{

const res = await fetch(API,{
headers:{
"Authorization":token
}
});

const dishes = await res.json();

const container=document.getElementById("menu-list");
container.innerHTML="";

dishes.forEach(dish=>{

const card=document.createElement("div");

card.className="dish-card";

card.innerHTML=`

<h2 class="text-xl font-bold">${dish.name}</h2>

<p>Category: ${dish.category}</p>

<p class="text-lg font-semibold mb-3">₹${dish.price}</p>

<button onclick='editDish(${JSON.stringify(dish)})'
class="bg-yellow-400 px-3 py-1 rounded mr-2 text-black">
Edit
</button>

<button onclick="deleteDish('${dish._id}')"
class="bg-red-500 px-3 py-1 rounded">
Delete
</button>

`;

container.appendChild(card);

});

}catch{

alert("Server waking up... refresh in 10 seconds");

}

}

/* ===== SAVE DISH ===== */

async function saveDish(){

const id=document.getElementById("dishId").value;
const name=document.getElementById("name").value;
const category=document.getElementById("category").value;
const price=document.getElementById("price").value;

if(!name||!category||!price){
alert("Fill all fields");
return;
}

const data={name,category,price};

try{

let res;

if(id){

res = await fetch(API+"/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify(data)
});

}else{

res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify(data)
});

}

if(!res.ok) throw new Error();

document.getElementById("dishId").value="";
document.getElementById("name").value="";
document.getElementById("price").value="";

loadMenu();

}catch{

alert("Server waking up... try again in 5 seconds");

}

}

/* ===== EDIT ===== */

function editDish(dish){

document.getElementById("dishId").value=dish._id;

document.getElementById("name").value=dish.name;

document.getElementById("category").value=dish.category;

document.getElementById("price").value=dish.price;

}

/* ===== DELETE ===== */

async function deleteDish(id){

await fetch(API+"/"+id,{
method:"DELETE",
headers:{
"Authorization":token
}
});

loadMenu();

}
  async function toggleAvailability(id,currentStatus){

await fetch(API+"/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({
available:!currentStatus
})
});

loadMenu();

}

/* ===== INITIAL LOAD ===== */

loadMenu();

</script>

</body>
</html>
