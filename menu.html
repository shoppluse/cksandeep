<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Kitchen Admin</title><script src="https://cdn.tailwindcss.com"></script><style>

body{
background: linear-gradient(135deg,#ff7a18,#ffb347,#ff416c);
min-height:100vh;
font-family:sans-serif;
color:white;
}

.form-card{
background: rgba(255,255,255,0.18);
backdrop-filter: blur(15px);
border-radius:22px;
padding:30px;
max-width:520px;
margin:auto;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.input-field{
width:100%;
padding:14px;
border-radius:12px;
color:black;
background:white;
outline:none;
margin-top:6px;
}

.save-btn{
background: linear-gradient(135deg,#00c853,#009624);
padding:14px;
border-radius:14px;
width:100%;
font-weight:bold;
margin-top:12px;
transition:0.25s;
}

.save-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.dish-card{
background: rgba(255,255,255,0.2);
backdrop-filter: blur(10px);
padding:18px;
border-radius:18px;
transition:0.25s;
}

.dish-card:hover{
transform:scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

</style></head><body class="p-8"><h1 class="text-4xl font-bold mb-6 text-center">🍛 Kitchen Admin Panel</h1><div class="flex justify-center mb-6">
<button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">
Logout
</button>
</div><!-- ADD DISH FORM --><div class="form-card mb-12"><h2 class="text-2xl font-bold mb-6 text-center">Add Dish</h2><label>Dish Name</label>
<input id="name" class="input-field" placeholder="Paneer Butter Masala">

<label>Category</label>
<select id="category" class="input-field">

<option>Rice</option>
<option>Curry</option>
<option>Breads</option>
<option>Chinese</option>
<option>Beverage</option>
<option>Dessert</option>
<option>Others</option></select><label>Price ₹</label>
<input id="price" type="number" class="input-field">

<button onclick="saveDish()" class="save-btn">Save Dish</button>

<input type="hidden" id="dishId"></div><!-- DISH LIST --><div id="menu-list" class="grid md:grid-cols-3 gap-6"></div><script>

/* ===== LOGIN PROTECTION ===== */

const token = localStorage.getItem("token");

if(!token){
alert("Please login first");
window.location="login.html";
}

/* ===== API BASE ===== */

const API = "https://cloud-kitchen-is6g.onrender.com/api/dishes";

/* ===== AUTH HEADER ===== */

function authHeaders(extra = {}){
return {
"Authorization":"Bearer "+token,
...extra
};
}

/* ===== LOGOUT ===== */

function logout(){
localStorage.removeItem("token");
window.location="login.html";
}

/* ===== LOAD DISHES ===== */

async function loadMenu(){

try{

const res = await fetch(API,{
headers: authHeaders()
});

const dishes = await res.json();

const container = document.getElementById("menu-list");
container.innerHTML = "";

dishes.forEach(dish=>{

const card=document.createElement("div");
card.className="dish-card";

card.innerHTML=`

<h2 class="text-xl font-bold">${dish.name}</h2>

<p>Category: ${dish.category}</p>

<p class="text-lg font-semibold">₹${dish.price}</p>

<p class="mb-3 font-bold">
Status: ${dish.available ? "✅ Available" : "❌ Unavailable"}
</p>

<button onclick='editDish(${JSON.stringify(dish)})'
class="bg-yellow-400 px-3 py-1 rounded mr-2 text-black">
Edit
</button>

<button onclick="toggleAvailability('${dish._id}',${dish.available})"
class="bg-blue-500 px-3 py-1 rounded mr-2">
Toggle
</button>

<button onclick="deleteDish('${dish._id}')"
class="bg-red-500 px-3 py-1 rounded">
Delete
</button>

`;

container.appendChild(card);

});

}catch(err){

alert("Server waking up... refresh after few seconds");

}

}

/* ===== SAVE DISH ===== */

async function saveDish(){

const id=document.getElementById("dishId").value;
const name=document.getElementById("name").value;
const category=document.getElementById("category").value;
const price=document.getElementById("price").value;

if(!name || !category || !price){
alert("Fill all fields");
return;
}

const data = {name,category,price};

try{

let res;

if(id){

res = await fetch(API+"/"+id,{
method:"PUT",
headers:authHeaders({
"Content-Type":"application/json"
}),
body:JSON.stringify(data)
});

}else{

res = await fetch(API,{
method:"POST",
headers:authHeaders({
"Content-Type":"application/json"
}),
body:JSON.stringify(data)
});

}

if(!res.ok) throw new Error();

document.getElementById("dishId").value="";
document.getElementById("name").value="";
document.getElementById("price").value="";

loadMenu();

}catch(err){

alert("Error saving dish. Try again.");

}

}

/* ===== EDIT DISH ===== */

function editDish(dish){

document.getElementById("dishId").value=dish._id;
document.getElementById("name").value=dish.name;
document.getElementById("category").value=dish.category;
document.getElementById("price").value=dish.price;

}

/* ===== DELETE DISH ===== */

async function deleteDish(id){

await fetch(API+"/"+id,{
method:"DELETE",
headers:authHeaders()
});

loadMenu();

}

/* ===== TOGGLE STATUS ===== */

async function toggleAvailability(id,currentStatus){

await fetch(API+"/"+id,{
method:"PUT",
headers:authHeaders({
"Content-Type":"application/json"
}),
body:JSON.stringify({
available:!currentStatus
})
});

loadMenu();

}

/* ===== INITIAL LOAD ===== */

loadMenu();

</script></body>
  </html>
