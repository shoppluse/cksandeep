<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-500 to-blue-500 h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-xl w-96">

<h2 class="text-2xl font-bold mb-4 text-center">Login</h2>

<input id="email" placeholder="Email" class="border p-2 w-full mb-3 rounded">

<input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-4 rounded">

<button onclick="login()" class="bg-blue-500 text-white w-full p-2 rounded">
Login
</button>

<p class="mt-4 text-center">
New user?
<a href="signup.html" class="text-blue-500">Signup</a>
</p>

</div>

<script>

const API="https://cloud-kitchen-is6g.onrender.com";

async function login(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const res=await fetch(API+"/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data=await res.json();

if(data.token){

localStorage.setItem("token",data.token);

alert("Login successful");

window.location="menu.html";

}else{

alert(data.message);

}

}

</script>

</body>
</html>
